name: Functions CI

on:
  push:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/functions-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "functions/**"
      - "firebase.json"
      - ".github/workflows/functions-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-lint-test:
    name: Build, Lint, Test Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node 24
        uses: actions/setup-node@0a44ba7841725637a19e28fa30b79a866c81b0a6 # v4.0.4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit
        run: npm run audit
